services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5674:5672" 
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: transfers
      POSTGRES_USER: transfer_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"