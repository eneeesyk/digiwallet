services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5673"    # uygulama bağlantısı
      - "15672:15672"  # yönetim arayüzü
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: statement
      POSTGRES_USER: statement_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5433"
